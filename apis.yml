aid: postgresql
name: PostgreSQL
description: >-
  PostgreSQL is a powerful, open-source object-relational database system
  with over 35 years of active development. It provides advanced SQL
  compliance, ACID transactions, and extensibility. PostgreSQL exposes a
  binary wire protocol via libpq and language bindings rather than a public
  HTTP REST API, so there is no canonical OpenAPI specification. HTTP access
  is typically layered on top via PostgREST, Hasura, or application code.
