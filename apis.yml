aid: postgresql
name: PostgreSQL
description: >-
  PostgreSQL is a powerful, open-source object-relational database system
  with over 35 years of active development. It provides advanced SQL
  compliance, ACID transactions, and extensibility. The PostgreSQL API
  refers to the client libraries and server interfaces.
